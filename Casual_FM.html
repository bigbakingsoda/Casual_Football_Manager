    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; user-select: none; }
        .tab-content, #main-app, #club-modal, #create-club-screen { display: none; }
        .tab-content.active { display: block; }
        
        /* Tactical Pitch */
        .pitch { 
            background: #15803d; border: 4px solid white; border-radius: 10px; 
            position: relative; width: 100%; height: 500px; 
            background-image: 
                linear-gradient(rgba(255,255,255,0.3) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255,255,255,0.3) 2px, transparent 2px);
            background-size: 50px 50px;
        }
        .pitch::before { 
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%;
        }
        .pitch::after { 
            content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.5);
        }
        .tac-node {
            position: absolute; width: 36px; height: 36px; background: #dc2626; color: white;
            border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; cursor: grab; transform: translate(-50%, -50%);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10; transition: background 0.2s;
        }
        .tac-node:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.1); }
        .star-rating { color: #eab308; letter-spacing: -2px; font-size: 14px;}
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

            let adjs = POS_ADJ[natPos].sort(() => 0.5 - Math.random());
            if(adjs[0]) fam[adjs[0]] = 15; // Accomplished
            if(adjs[1]) fam[adjs[1]] = 10; // Competent

            const pa = Math.floor(Math.random() * 80) + 100;
            let ca;
            let pS = (natPos === 'GK' || natPos === 'DC') ? 27 : 24; // Peak start age
            let pE = (natPos === 'GK' || natPos === 'DC') ? 33 : 31; // Peak end age
            
            if(age < pS) ca = Math.floor(pa * (0.4 + (0.6 * ((age - 15) / (pS - 15)))));
            else if (age > pE) ca = Math.floor(pa * (1 - (0.3 * ((age - pE) / (38 - pE)))));
            else ca = pa;
            ca = Math.min(200, Math.max(10, ca));
            
            let n = NATIONS[natCode] || NATIONS["EN"];
            let name = n.f.split(",")[Math.floor(Math.random()*n.f.split(",").length)] + " " + n.l.split(",")[Math.floor(Math.random()*n.l.split(",").length)];

            return {
                id: Math.random().toString(36).substr(2, 9),
                name: name, nat: n.m, age: age, ca: ca, pa: pa,
                natPos: natPos, fam: fam,
                val: Math.floor((ca/100) * (200/age) * 2000000)
            };
        }

        function initWorld() {
            let cid = 0;
            for(let c in LEAGUES) {
                // Generate Main Division
                LEAGUES[c].forEach(team => {
                    let rep = Math.floor(Math.random() * 60) + 35;
                    let club = { id: cid++, name: team, nation: c, rep: rep, squad: [], league: c, points: 0, budget: Math.floor(rep * rep * 15000), isUser: false };
                    for(let i=0; i<25; i++) {
                        let p = createPlayer(c); p.ca += Math.floor((rep - 50) / 3); p.val = Math.floor((p.ca/100) * (200/p.age) * 2000000);
                        club.squad.push(p); state.world.push(p);
                    }
                    state.clubs.push(club);
                });
                
                // Generate Hidden Lower Division (for Promotion/Relegation system)
                for(let i=1; i<=6; i++) {
                    let club = { id: cid++, name: c + " City " + i, nation: c, rep: 30, squad: [], league: c+"_LOW", points: 0, budget: 2000000, isUser: false };
                    for(let j=0; j<22; j++) { let p = createPlayer(c); club.squad.push(p); state.world.push(p); }
                    state.lowerClubs.push(club);
                }
            }
        }

        /* --- TACTICS & STAR RATINGS --- */
        function getStarRating(ca, famLvl) {
            // Base stars on CA (relative to a 200 scale), heavily penalized by familiarity
            let effectiveCA = ca * (famLvl / 20);
            let stars = Math.max(0.5, Math.min(5, Math.round((effectiveCA / 180) * 5 * 2) / 2));
            
            let html = '';
            for(let i=1; i<=5; i++) {
                if(stars >= i) html += '★';
                else if(stars >= i - 0.5) html += '⯪'; // Half star
                else html += '☆';
            }
            return `<span class="star-rating">${html}</span>`;
        }

        let draggedNode = null;
        function renderPitch() {
            const p = document.getElementById('pitch-container');
            p.innerHTML = state.tactics.map((pos, i) => `
                <div class="tac-node ${pos.pid ? 'bg-emerald-600' : 'bg-red-600'}" draggable="true" data-idx="${i}" style="left:${pos.x}%; top:${pos.y}%;" ondragstart="dragStart(event)" ondragend="dragEnd(event)">
                    ${pos.id}
                </div>
            `).join('');
            p.ondragover = (e) => e.preventDefault();
        }

        function dragStart(e) { draggedNode = e.target; }
        function dragEnd(e) {
            if(!draggedNode) return;
            const pitch = document.getElementById('pitch-container').getBoundingClientRect();
            let x = ((e.clientX - pitch.left) / pitch.width) * 100; let y = ((e.clientY - pitch.top) / pitch.height) * 100;
            x = Math.max(5, Math.min(95, x)); y = Math.max(5, Math.min(95, y));
            const idx = draggedNode.getAttribute('data-idx');
            state.tactics[idx].x = x; state.tactics[idx].y = y;
            
            // Snap to nearest recognized position based on coordinates
            if(y > 85) state.tactics[idx].id = 'GK';
            else if(y > 65) {
                if(x < 25) state.tactics[idx].id = 'DL'; else if(x > 75) state.tactics[idx].id = 'DR'; else state.tactics[idx].id = 'DC';
            }
            else if(y > 55) {
                if(x < 25) state.tactics[idx].id = 'WBL'; else if(x > 75) state.tactics[idx].id = 'WBR'; else state.tactics[idx].id = 'DM';
            }
            else if(y > 40) {

            renderPitch(); renderTacticsList();

        /* --- SIMULATION ENGINE --- */
        function calculateTeamStrength(club) {
            if(club.id === state.userClubId) {
                // User strength based on active tactic lineup
                let str = 0;
                state.tactics.forEach(node => {
                    let p = club.squad.find(x => x.id === node.pid);
                    if(p) str += p.ca * (p.fam[node.id] || 1) / 20;
                });
                return str / 11; // Avg CA of starting 11
            } else {
                // AI strength based on top 11 players
                let top11 = club.squad.sort((a,b)=>b.ca-a.ca).slice(0, 11);
                return top11.reduce((sum, p) => sum + p.ca, 0) / 11;
            }
        }

        function simulateMatch(home, away) {
            let hStr = calculateTeamStrength(home) + 5; // Home advantage
            let aStr = calculateTeamStrength(away);
            
            let hGoals = Math.max(0, Math.round((Math.random() * (hStr / 40)) - 0.5));
            let aGoals = Math.max(0, Math.round((Math.random() * (aStr / 40)) - 0.5));
            
            if(hGoals > aGoals) { home.points += 3; return {res: 'W', opp: away.name, score: `${hGoals}-${aGoals}`}; }
            else if(aGoals > hGoals) { away.points += 3; return {res: 'L', opp: away.name, score: `${hGoals}-${aGoals}`}; }
            else { home.points += 1; away.points += 1; return {res: 'D', opp: away.name, score: `${hGoals}-${aGoals}`}; }
        }

        function runYouthDevelopment() {
            state.world.forEach(p => {
                let pS = (p.natPos === 'GK' || p.natPos === 'DC') ? 27 : 24; 
                let pE = (p.natPos === 'GK' || p.natPos === 'DC') ? 33 : 31;
                
                if(p.age < pS && p.ca < p.pa) {
                    p.ca += Math.floor(Math.random() * 3); // Growth
                } else if(p.age > pE) {
                    p.ca -= Math.floor(Math.random() * 2); // Decay
                }
                p.ca = Math.min(200, Math.max(10, p.ca));
                p.val = Math.floor((p.ca/100) * (200/p.age) * 2000000);
            });
        }

        function advanceWeek() {
            // Check if tactic is filled
            const myClub = state.clubs.find(c => c.id === state.userClubId);
            const emptyNodes = state.tactics.filter(n => !n.pid).length;
            if(emptyNodes > 0 && myClub) {
                alert(`You have ${emptyNodes} empty slots in your tactics! Please assign players.`);
                return showTab('tactics');
            }

            state.week++;
            state.date.setDate(state.date.getDate() + 7);
            document.getElementById('ui-date').innerText = state.date.toDateString().toUpperCase() + ` (Wk ${state.week})`;
            
            // Development every 4 weeks
            if(state.week % 4 === 0) runYouthDevelopment();

            // End of season
            if(state.week > 38) {
                processEndOfSeason();
                return;
            }

            // Simulate League Matches
            let userResult = null;
            let leaguesToSim = [...new Set(state.clubs.map(c => c.league))];
            
            leaguesToSim.forEach(lg => {
                let lgClubs = state.clubs.filter(c => c.league === lg);
                // Simple random pairing for the week
                let shuffled = lgClubs.sort(() => 0.5 - Math.random());
                for(let i=0; i<shuffled.length; i+=2) {
                    if(!shuffled[i+1]) break;
                    let match = simulateMatch(shuffled[i], shuffled[i+1]);
                    
                    if(shuffled[i].id === state.userClubId) userResult = match;
                    else if(shuffled[i+1].id === state.userClubId) {
                        // Invert result for away perspective
                        userResult = {
                            res: match.res === 'W' ? 'L' : match.res === 'L' ? 'W' : 'D',
                            opp: shuffled[i].name,
                            score: match.score.split('-').reverse().join('-')
                        };
                    }
                }
            });

            // Simulate Lower Leagues internally
            let lowLeagues = [...new Set(state.lowerClubs.map(c => c.league))];
            lowLeagues.forEach(lg => {
                let lgClubs = state.lowerClubs.filter(c => c.league === lg);
                let shuffled = lgClubs.sort(() => 0.5 - Math.random());
                for(let i=0; i<shuffled.length; i+=2) {
                    if(shuffled[i+1]) simulateMatch(shuffled[i], shuffled[i+1]);
                }
            });

            // Handle UI Updates
            if(userResult) {
                let color = userResult.res === 'W' ? 'text-emerald-600' : userResult.res === 'L' ? 'text-red-600' : 'text-slate-600';
                logMessage(`<b>Match Result</b><br>You played against ${userResult.opp}. Result: <span class="font-black ${color}">${userResult.res} (${userResult.score})</span>`);
            } else {
                logMessage(`<b>Matchweek Complete</b><br>No fixture for you this week.`);
            }

            if(Math.random() > 0.7) generateJobs();
            refreshUI();
        }

        function processEndOfSeason() {
            logMessage(`<span class="text-purple-600 font-black text-lg">SEASON COMPLETE</span><br>Processing promotion, relegation, and youth intake...`);
            
            let leaguesToSim = [...new Set(state.clubs.map(c => c.league))];
            
            leaguesToSim.forEach(lg => {
                // Sort main league
                let mainClubs = state.clubs.filter(c => c.league === lg).sort((a,b) => b.points - a.points);
                // Sort lower league
                let lowerClubs = state.lowerClubs.filter(c => c.league === lg + "_LOW").sort((a,b) => b.points - a.points);
                
                if(lowerClubs.length > 0 && mainClubs.length > 3) {
                    // Bottom 3 of main
                    let relegated = mainClubs.slice(-3);
                    // Top 3 of lower
                    let promoted = lowerClubs.slice(0, 3);
                    
                    // Swap leagues
                    relegated.forEach(c => { c.league = lg + "_LOW"; c.points = 0; });
                    promoted.forEach(c => { c.league = lg; c.points = 0; });
                    
                    // Move in arrays
                    state.clubs = state.clubs.filter(c => !relegated.includes(c)).concat(promoted);
                    state.lowerClubs = state.lowerClubs.filter(c => !promoted.includes(c)).concat(relegated);
                    
                    if(relegated.find(c => c.id === state.userClubId)) {
                        alert("You have been relegated! The board has sacked you.");
                        state.userClubId = null;
                        document.getElementById('main-app').style.display = 'none';
                        document.getElementById('start-screen').style.display = 'flex';
                        setMode('standard');
                    }
                } else {
                    mainClubs.forEach(c => c.points = 0);
                }
            });

            // Age players & Retires
            state.world = state.world.filter(p => {
                p.age++;
                if(p.age > 35 && Math.random() > 0.5) {
                    // Retire player, remove from clubs
                    state.clubs.forEach(c => c.squad = c.squad.filter(sp => sp.id !== p.id));
                    state.lowerClubs.forEach(c => c.squad = c.squad.filter(sp => sp.id !== p.id));
                    return false;
                }
                return true;
            });

            // Youth Intake (Generate new 16yo players)
            state.clubs.forEach(c => {
                for(let i=0; i<3; i++) {
                    let p = createPlayer(c.nation);
                    p.age = 16;
                    c.squad.push(p);
                    state.world.push(p);
                }
            });

            state.week = 1;
            state.date.setFullYear(state.date.getFullYear() + 1);
            state.date.setMonth(7); // Reset to August
            state.date.setDate(1);
            
            refreshUI();
            if(state.userClubId) {
                let myClub = state.clubs.find(c => c.id === state.userClubId);
                myClub.budget += Math.floor(myClub.rep * 100000); // New season budget
                state.balance = myClub.budget;
                logMessage(`<b>New Season Begins</b><br>The board has reset expectations and given you a fresh budget of ${formatVal(state.balance)}.`);
            }
        }

        // Initialize!
        initWorld();

    </script>
